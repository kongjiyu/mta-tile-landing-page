name: Deploy to Shinjiru via FTP

on:
  push:
    branches: [main]
    paths:
      - 'static/**'
      - 'static-redesign.py'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Regenerate static site
        run: python3 static-redesign.py
      - name: Sanity-check
        run: |
          test -f static/index.html || (echo "missing" && exit 1)
          test -f static/favicon.ico || (echo "missing" && exit 1)
      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./static/
          server-dir: /public_html/
          state-name: ftp-deploy-state
          exclude: |
            .git/**
            .DS_Store
