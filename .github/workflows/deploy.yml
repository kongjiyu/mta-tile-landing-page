name: Deploy to Shinjiru via FTP

on:
  push:
    branches: [main]
    paths:
      # Only trigger when the deployable site or its generator changes.
      # Backup artifacts, recovered/, extracted/, etc. are gitignored.
      - 'static/**'
      - 'static-redesign.py'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    # Allow manual re-deploy from GitHub Actions tab.

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate static site
        run: python3 static-redesign.py

      - name: Sanity-check generated files
        run: |
          test -f static/index.html || (echo "::error::static/index.html missing" && exit 1)
          test -f static/favicon.ico || (echo "::error::static/favicon.ico missing" && exit 1)
          echo "Static site regenerated OK"

      - name: Deploy to Shinjiru via FTP
        uses: SamKirkland/ftp-deploy@v4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./static/
          server-dir: /public_html/
          exclude: |
            .git/**
            .DS_Store
          state-name: ftp-deploy-state
          dangerously-clean-on-failure: false
          # We keep the server's hidden files (.htaccess etc.) but
          # this action does NOT delete server-side files not present
          # locally. To do a hard sync, uncomment --delete below.
          # args: --delete

      - name: Show deploy summary
        if: always()
        run: |
          echo "### Deploy summary" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Author: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date -u)" >> $GITHUB_STEP_SUMMARY
